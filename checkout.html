<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout – My Saree</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; max-width: 900px; margin-left: auto; margin-right: auto; }
    h1 { font-size: 1.5rem; }
    .row { display: flex; flex-wrap: wrap; gap: 24px; }
    .col { flex: 1; min-width: 280px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; }
    .cart-summary { background: #f5f5f5; padding: 16px; border-radius: 8px; margin-bottom: 20px; }
    .cart-summary h2 { margin-top: 0; }
    .cart-item { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
    .cart-total { font-size: 1.25rem; font-weight: 700; margin-top: 12px; }
    .btn { padding: 14px 24px; background: #093174; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; width: 100%; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .empty { text-align: center; padding: 40px; color: #666; }
    .back { display: inline-block; margin-bottom: 16px; color: #093174; text-decoration: none; }
    .error { color: #c00; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>
  <a class="back" href="/">← Back to shop</a>
  <h1>Checkout</h1>

  <div id="cart-summary" class="cart-summary"></div>
  <div id="checkout-form-wrap" style="display: none;">
    <form id="checkout-form">
      <div class="row">
        <div class="col">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
          <label for="name">Full name *</label>
          <input type="text" id="name" name="name" required>
          <label for="phone">Phone *</label>
          <input type="tel" id="phone" name="phone" required>
        </div>
        <div class="col">
          <label for="address">Address (line 1) *</label>
          <input type="text" id="address" name="address" required>
          <label for="address2">Address (line 2)</label>
          <input type="text" id="address2" name="address2">
          <label for="city">City *</label>
          <input type="text" id="city" name="city" required>
          <label for="state">State *</label>
          <input type="text" id="state" name="state" required>
          <label for="pincode">Pincode *</label>
          <input type="text" id="pincode" name="pincode" required pattern="[0-9]{6}" maxlength="6" placeholder="6 digits">
        </div>
      </div>
      <p id="form-error" class="error" style="display: none;"></p>
      <button type="submit" class="btn" id="pay-btn">Pay & place order</button>
    </form>
  </div>

  <script>
    var CART_KEY = 'mysaree_cart';
    function getCart() {
      try { return JSON.parse(localStorage.getItem(CART_KEY) || '[]'); } catch (e) { return []; }
    }
    function renderSummary() {
      var cart = getCart();
      var wrap = document.getElementById('cart-summary');
      var formWrap = document.getElementById('checkout-form-wrap');
      if (!cart.length) {
        wrap.innerHTML = '<p class="empty">Your cart is empty. <a href="/">Continue shopping</a></p>';
        formWrap.style.display = 'none';
        return;
      }
      var total = 0;
      var html = '<h2>Order summary</h2>';
      cart.forEach(function (i) {
        var sub = (i.price || 0) * (i.quantity || 1);
        total += sub;
        var img = i.image ? '<img src="' + i.image + '" alt="">' : '';
        html += '<div class="cart-item"><div>' + img + '</div><div><strong>' + (i.title || 'Item') + '</strong><br>₹' + (i.price || 0) + ' × ' + (i.quantity || 1) + ' = ₹' + sub + '</div></div>';
      });
      html += '<p class="cart-total">Total: ₹' + total + '</p>';
      wrap.innerHTML = html;
      formWrap.style.display = 'block';
      window._checkoutTotal = total;
      window._checkoutCart = cart;
    }
    renderSummary();

    document.getElementById('checkout-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var cart = getCart();
      if (!cart.length) { alert('Cart is empty'); return; }
      var btn = document.getElementById('pay-btn');
      var errEl = document.getElementById('form-error');
      errEl.style.display = 'none';
      btn.disabled = true;

      var customer = {
        email: document.getElementById('email').value.trim(),
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        address: document.getElementById('address').value.trim(),
        address2: document.getElementById('address2').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim(),
        pincode: document.getElementById('pincode').value.trim()
      };

      fetch('/api/create-order', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cart: cart, customer: customer })
      })
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.error) {
            errEl.textContent = data.error;
            errEl.style.display = 'block';
            btn.disabled = false;
            return;
          }
          if (data.payment_url) {
            window.location.href = data.payment_url;
            return;
          }
          if (data.razorpay_order_id && data.key) {
            var script = document.createElement('script');
            script.src = 'https://checkout.razorpay.com/v1/checkout.js';
            script.onload = function () {
              var options = {
                key: data.key,
                amount: data.amount,
                currency: data.currency || 'INR',
                order_id: data.razorpay_order_id,
                name: 'My Saree',
                description: 'Order #' + data.order_id,
                handler: function (res) {
                  fetch('/api/confirm-payment', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_id: data.order_id }) })
                    .then(function () { window.location.href = '/order-placed.html?order_id=' + encodeURIComponent(data.order_id); })
                    .catch(function () { window.location.href = '/order-placed.html?order_id=' + encodeURIComponent(data.order_id); });
                },
                prefill: { name: customer.name, email: customer.email, contact: customer.phone }
              };
              var rzp = new Razorpay(options);
              rzp.on('payment.failed', function () {
                errEl.textContent = 'Payment failed. Please try again.';
                errEl.style.display = 'block';
                btn.disabled = false;
              });
              rzp.open();
            };
            document.head.appendChild(script);
            return;
          }
          if (data.order_id) {
            window.location.href = '/order-placed.html?order_id=' + encodeURIComponent(data.order_id);
          } else {
            errEl.textContent = 'Invalid response from server.';
            errEl.style.display = 'block';
            btn.disabled = false;
          }
        })
        .catch(function () {
          errEl.textContent = 'Something went wrong. Please try again.';
          errEl.style.display = 'block';
          btn.disabled = false;
        });
    });
  </script>
</body>
</html>
